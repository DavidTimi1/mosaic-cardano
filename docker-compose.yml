services:

  memgraph:
    image: memgraph/memgraph:latest
    container_name: mosaic-memgraph
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
    restart: unless-stopped

  memgraph-lab:
    image: memgraph/lab:latest
    ports:
      - "3003:3000"
    depends_on:
      - memgraph

  redis:
    image: redis:7-alpine
    container_name: mosaic-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass $REDIS_PASSWORD # Secure your cache
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  memgraph_data:
  redis_data: